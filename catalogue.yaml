- name: catalogue configuration setup using ansible
  hosts: catalogue
  become: yes
  tasks:
    - name: disable node js module
      ansible.builtin.command: dnf module disable nodejs -y
    - name: enable nodejs20 version
      ansible.builtin.command: dnf module enable nodejs:20 -y
    - name: install nodejs
      ansible.builtin.dnf:
        name: nodejs
        state: present
    - name: create system user
      ansible.builtin.user:
        name: roboshop
        shell: /sbin/nologin
        system: true
        home: /app
    - name: create app directory
      ansible.builtin.file:
        path: /app
        state: directory
    - name: download catalogue file
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip
    - name: extract catalogue folder 
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes
    - name: install dependencies
      community.general.npm:
        path: /app
    - name: copy catalogue service to system directory
      ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service
    - name: systemctl daemon reload
      ansible.builtin.systemd_service:
        daemon_reload: true
    - name: start and enable catalogue service
      ansible.builtin.service:
        name: catalogue
        state: started
        enabled: yes
    - name: install mongodb client is mongosh
      ansible.builtin.dnf:
        name: mongodb-mongosh
        state: present
    - name: load products 
      ansible.builtin.shell: mongosh --host mongodb.bankstatement2xl.com </app/db/master-data.js
      